    <style>
        /* جميع الأنماط كما هي تماماً (لن أغيرها للحفاظ على التصميم) */

        /* التصميم كامل كما في السابق (لن أكرره هنا للاختصار لكنه موجود في الكود النهائي) */

    </style>
</head>
<body>
    <!-- جميع عناصر HTML كما هي دون تغيير -->
    <div id="appMain" class="app hidden">...</div>

    <script>
        // Firebase Config (نفسه)
        const firebaseConfig = {
            apiKey: "AIzaSyBeuyUhbnsE4LVrE6RKYe_vbhir2WLnQ1A",
            authDomain: "al-zahrani-is-fuel.firebaseapp.com",
            databaseURL: "https://al-zahrani-is-fuel-default-rtdb.firebaseio.com",
            projectId: "al-zahrani-is-fuel",
            storageBucket: "al-zahrani-is-fuel.appspot.com",
            messagingSenderId: "379225678294",
            appId: "1:379225678294:web:4fda8847260c4a5d230477"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const storage = firebase.storage();

        const ADMIN_USERNAME = "هوندا";
        const ADMIN_EMAIL = "honda@al-zahrani.com";
        const ADMIN_PASSWORD = "123321@#";

        // متغيرات عامة
        let currentUser = null, currentUserData = null;
        let mediaStream = null, mediaRecorder = null, recordedChunks = [], isRecording = false;
        let capturedPlateImage = null, capturedBeforeImage = null, capturedAfterImage = null, capturedVideoBlob = null;
        let aiModel = null;
        let cameraPermissionGranted = false;

        // ================== تحسين سرعة التقاط الصور ==================
        async function captureImage(type) {
            if (!cameraPermissionGranted) await requestCameraPermission();
            const video = document.getElementById('cameraPreview');
            if (!video.videoWidth) { alert("الكاميرا غير جاهزة"); return; }
            const canvas = document.createElement('canvas');
            // تصغير الصورة بشكل كبير جداً (300 بكسل عرض)
            const targetWidth = 300;
            const scale = targetWidth / video.videoWidth;
            canvas.width = targetWidth;
            canvas.height = video.videoHeight * scale;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            // ضغط عالٍ جداً (جودة 0.3)
            const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.3));
            const url = URL.createObjectURL(blob);
            const thumb = document.createElement('img');
            thumb.src = url;
            thumb.className = 'media-thumb';
            if (type === 'plate') capturedPlateImage = { blob, url, element: thumb };
            else if (type === 'before') capturedBeforeImage = { blob, url, element: thumb };
            else capturedAfterImage = { blob, url, element: thumb };
            document.getElementById('mediaThumbnails').appendChild(thumb);
        }

        // ================== تحسين سرعة تسجيل الفيديو ==================
        function startVideoRecording() {
            if (!cameraPermissionGranted) { requestCameraPermission(); return; }
            if (!mediaStream) { alert("الكاميرا غير مفعلة"); return; }
            if (isRecording) return;
            isRecording = true;
            recordedChunks = [];
            let mimeType = 'video/webm';
            if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = '';
            try {
                // جودة فيديو منخفضة جداً لتسريع الرفع
                mediaRecorder = new MediaRecorder(mediaStream, { mimeType, videoBitsPerSecond: 200000 }); // 200kbps
            } catch(e) { alert("لا يمكن بدء التسجيل: "+e.message); isRecording=false; return; }
            mediaRecorder.ondataavailable = (e) => { if(e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                isRecording = false;
                if (recordedChunks.length === 0) { alert("⚠️ لم يتم تسجيل بيانات. حاول مرة أخرى"); return; }
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                capturedVideoBlob = blob;
                const thumb = document.createElement('div');
                thumb.className = 'media-thumb video';
                thumb.innerHTML = '<i class="fas fa-video"></i>';
                document.getElementById('mediaThumbnails').appendChild(thumb);
                document.getElementById('startVideoBtn').style.display = 'inline-flex';
                document.getElementById('stopVideoBtn').style.display = 'none';
                recordedChunks = [];
            };
            // نجمع البيانات كل ثانية
            mediaRecorder.start(1000);
            document.getElementById('startVideoBtn').style.display = 'none';
            document.getElementById('stopVideoBtn').style.display = 'inline-flex';
            // إيقاف تلقائي بعد 7 ثوانٍ لمنع فيديو طويل
            setTimeout(() => { if (mediaRecorder && mediaRecorder.state === 'recording') stopVideoRecording(); }, 7000);
            alert("✅ بدأ التسجيل (سيوقف تلقائياً بعد 7 ثوانٍ)");
        }
        function stopVideoRecording() { if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop(); }

        // ================== رفع الملفات مع شريط تقدم محسن ==================
        function uploadFile(blob, path, onProgress) {
            return new Promise((resolve, reject) => {
                const ref = storage.ref().child(path);
                const uploadTask = ref.put(blob);
                uploadTask.on('state_changed', 
                    (snapshot) => {
                        const percent = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                        if (onProgress) onProgress(percent);
                    },
                    (error) => reject(error),
                    () => uploadTask.snapshot.ref.getDownloadURL().then(resolve).catch(reject)
                );
            });
        }

        async function quickSaveOperation() {
            if (!currentUser) { alert("الرجاء تسجيل الدخول"); return; }
            if (!capturedPlateImage || !capturedBeforeImage || !capturedAfterImage || !capturedVideoBlob) {
                alert("الرجاء إكمال جميع الصور والفيديو المطلوبة");
                return;
            }
            try {
                showProgress('جاري رفع الملفات...', 10);
                const opId = Date.now().toString();
                const uid = currentUser.uid;
                let progress = { plate:0, before:0, after:0, video:0 };
                const updateOverall = () => {
                    const total = (progress.plate + progress.before + progress.after + progress.video) / 4;
                    showProgress('جاري الرفع...', Math.floor(total));
                };
                const [plateURL, beforeURL, afterURL, videoURL] = await Promise.all([
                    uploadFile(capturedPlateImage.blob, `operations/${uid}/${opId}/plate.jpg`, (p) => { progress.plate = p; updateOverall(); }),
                    uploadFile(capturedBeforeImage.blob, `operations/${uid}/${opId}/before.jpg`, (p) => { progress.before = p; updateOverall(); }),
                    uploadFile(capturedAfterImage.blob, `operations/${uid}/${opId}/after.jpg`, (p) => { progress.after = p; updateOverall(); }),
                    uploadFile(capturedVideoBlob, `operations/${uid}/${opId}/video.webm`, (p) => { progress.video = p; updateOverall(); })
                ]);
                showProgress('جاري حفظ البيانات...', 90);
                await db.ref('operations').push({
                    delegateId: uid,
                    delegateName: currentUserData?.username,
                    project: currentUserData?.project,
                    region: currentUserData?.region,
                    fuelType: currentUserData?.fuelType,
                    timestamp: new Date().toISOString(),
                    media: { plate: plateURL, before: beforeURL, after: afterURL, video: videoURL },
                    isSuspicious: false
                });
                showProgress('✓ تم الحفظ', 100);
                setTimeout(() => { hideProgress(); alert("✅ تم حفظ العملية بنجاح"); }, 500);
                // إعادة تعيين
                capturedPlateImage = capturedBeforeImage = capturedAfterImage = null;
                capturedVideoBlob = null;
                document.getElementById('mediaThumbnails').innerHTML = '';
            } catch(e) { hideProgress(); alert("❌ خطأ: "+e.message); }
        }

        async function saveOperationWithAI() {
            if (!currentUser) { alert("الرجاء تسجيل الدخول"); return; }
            if (!capturedPlateImage || !capturedBeforeImage || !capturedAfterImage || !capturedVideoBlob) {
                alert("الرجاء إكمال جميع الصور والفيديو المطلوبة");
                return;
            }
            try {
                showProgress('جاري رفع الملفات...', 10);
                const opId = Date.now().toString();
                const uid = currentUser.uid;
                let progress = { plate:0, before:0, after:0, video:0 };
                const updateOverall = () => {
                    const total = (progress.plate + progress.before + progress.after + progress.video) / 4;
                    showProgress('جاري الرفع...', Math.floor(total));
                };
                const [plateURL, beforeURL, afterURL, videoURL] = await Promise.all([
                    uploadFile(capturedPlateImage.blob, `operations/${uid}/${opId}/plate.jpg`, (p) => { progress.plate = p; updateOverall(); }),
                    uploadFile(capturedBeforeImage.blob, `operations/${uid}/${opId}/before.jpg`, (p) => { progress.before = p; updateOverall(); }),
                    uploadFile(capturedAfterImage.blob, `operations/${uid}/${opId}/after.jpg`, (p) => { progress.after = p; updateOverall(); }),
                    uploadFile(capturedVideoBlob, `operations/${uid}/${opId}/video.webm`, (p) => { progress.video = p; updateOverall(); })
                ]);
                showProgress('جاري تحليل الصور بالذكاء الاصطناعي...', 85);
                let beforeAnalysis = [], afterAnalysis = [];
                if (aiModel) {
                    try { beforeAnalysis = await aiModel.classify(capturedBeforeImage.element); } catch(e) {}
                    try { afterAnalysis = await aiModel.classify(capturedAfterImage.element); } catch(e) {}
                }
                await db.ref('operations').push({
                    delegateId: uid,
                    delegateName: currentUserData?.username,
                    project: currentUserData?.project,
                    region: currentUserData?.region,
                    fuelType: currentUserData?.fuelType,
                    timestamp: new Date().toISOString(),
                    media: { plate: plateURL, before: beforeURL, after: afterURL, video: videoURL },
                    aiAnalysis: { before: beforeAnalysis.slice(0,3), after: afterAnalysis.slice(0,3) },
                    isSuspicious: false
                });
                showProgress('✓ تم الحفظ', 100);
                setTimeout(() => { hideProgress(); alert("✅ تم حفظ العملية مع التحليل"); }, 500);
                capturedPlateImage = capturedBeforeImage = capturedAfterImage = null;
                capturedVideoBlob = null;
                document.getElementById('mediaThumbnails').innerHTML = '';
            } catch(e) { hideProgress(); alert("❌ خطأ: "+e.message); }
        }

        // دوال أخرى (كاميرا، صلاحيات، عرض البيانات) كما هي دون تغيير جوهري
        async function checkCameraPermission() { /* كما هي */ }
        async function requestCameraPermission() { /* كما هي */ }
        async function startCamera() { /* كما هي */ }
        function stopCamera() { /* كما هي */ }
        function showProgress(step, percent) { /* كما هي */ }
        function hideProgress() { /* كما هي */ }
        // باقي الدوال (تسجيل الدخول، لوحة التحكم، إلخ) كما هي دون تعديل....

        // استخدام الدوال المعدلة
        window.quickSaveOperation = quickSaveOperation;
        window.saveOperationWithAI = saveOperationWithAI;
        window.captureImage = captureImage;
        window.startVideoRecording = startVideoRecording;
        window.stopVideoRecording = stopVideoRecording;
        
        // باقي الأحداث ونفس الكود السابق (مع الحفاظ على كل شيء)
    </script>
</body>
